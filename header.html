    <script>
        

        function updateDateTime() {
            const el = document.getElementById("live-datetime");
            if (!el) return;

            const now = new Date();
            const date = now.toLocaleDateString("en-US");
            const time = now.toLocaleTimeString("en-US", {
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: true
            });

            el.textContent = `${date} @ ${time} // Asia/Manila`;
        }
        
        updateDateTime();
        setInterval(updateDateTime, 1000); 

        function loadPageContent(targetId, url) {
            const targetEl = document.getElementById(targetId);
            if (!targetEl) {
                console.warn(`Target element #${targetId} not found syntax workspace.`);
                return;
            }

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error(`Could not fetch ${url}`);
                    return response.text();
                })
                .then(html => {
                    targetEl.innerHTML = html;

                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const scripts = doc.querySelectorAll('script');
                    scripts.forEach(script => {
                        const newScript = document.createElement('script');
                        newScript.textContent = script.textContent;
                        document.body.appendChild(newScript).remove();
                    });
                })
                .catch(error => {
                    targetEl.innerHTML = `<p style="color:red;">Error loading requested layout space.</p>`;
                    console.error('Layout Error:', error);
                });
        }

        loadPageContent('contact-info', 'mycontact.html');

        function handleRouting() {
            const hash = window.location.hash; 
            let targetLink = document.querySelector(`nav a[href="${hash}"]`);
            
            if (!targetLink) {
                targetLink = document.querySelector('nav a[href="#aboutme"]');
            }

            if (targetLink) {
                document.querySelectorAll('nav a').forEach(nav => nav.classList.remove('active'));
                targetLink.classList.add('active');

                const page = targetLink.getAttribute('data-page');
                loadPageContent('content', page);
            }
        }

        handleRouting();
        window.addEventListener('hashchange', handleRouting);

        window.rotatorInterval = null;

        window.startMyTitleRotator = function() {
            const slider = document.getElementById('title-slider');
            const items = document.querySelectorAll('.title-item');
            
            if (!slider || items.length === 0) {
                console.warn("Slider elements not found yet.");
                return;
            }

            if (window.rotatorInterval) clearInterval(window.rotatorInterval);

            let currentIndex = 0;

            window.rotatorInterval = setInterval(() => {
                currentIndex = (currentIndex + 1) % items.length;
                const shiftValue = currentIndex * 30; 
                slider.style.transform = `translateY(-${shiftValue}px)`;
            }, 1000); 
        };
    </script>
